<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; cursor: crosshair; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .leaflet-container { cursor: crosshair !important; }
        
        .control-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 1000; /* 下部に配置、横幅を広げる */
            background: rgba(255, 255, 255, 0.95); padding: 8px 10px; /* 縦パディングを少し増やし、横パディングを設ける */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; /* 横並びにする */
            flex-wrap: wrap; /* 要素が多い場合に折り返す */
            gap: 8px; /* 要素間の隙間 */
            align-items: center; /* 垂直方向中央寄せ */
            font-size: 13px;
        }

        .input-group { 
            flex-grow: 1; /* 入力欄を最大限に広げる */
            display: flex; 
            gap: 5px; 
            min-width: 200px; /* 最小幅を設定 */
        }
        input { flex: 1; padding: 7px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button { padding: 7px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; white-space: nowrap; /* ボタン内のテキストを折り返さない */ }
        .btn-row { 
            display: flex; 
            gap: 5px; 
            flex-grow: 0; /* 必要に応じて幅を調整 */
        }
        .btn-clear { background: #dc3545; }
        .info-panel { 
            background: #f0f4f8; 
            padding: 5px 8px; 
            border-radius: 6px; 
            border: 1px solid #d1d9e6;
            flex-grow: 0; /* 幅を内容に合わせる */
            white-space: nowrap;
        }
        .distance-display {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dist-label { font-size: 10px; color: #666; display: block; text-align: center; }
        .dist-value { font-size: 15px; font-weight: bold; color: #333; text-align: center; }
        .total-dist { color: #d32f2f; }
        
        /* スマートフォンでの表示調整 */
        @media (max-width: 768px) { /* 768px以下でレイアウトを変更 */
            .control-panel {
                flex-direction: column; /* 縦並びに戻す */
                align-items: stretch; /* 幅いっぱいに広げる */
                gap: 6px;
                padding: 6px 8px;
            }
            .input-group, .btn-row, .info-panel {
                width: 100%; /* 幅いっぱいに広げる */
                flex-shrink: 0; /* 縮まないように */
            }
            .btn-row {
                flex-wrap: wrap; /* ボタンも折り返す */
            }
            button {
                flex-grow: 1; /* ボタンも均等に広げる */
                min-width: unset; /* 最小幅をリセット */
            }
            .info-panel {
                text-align: center;
            }
            .dist-label, .dist-value {
                text-align: center; /* 念のため中央寄せ */
            }
        }

        /* 現在地マーカーのスタイル（変更なし） */
        .current-location-icon {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="住所・施設名・緯度経度を入力">
            <button onclick="searchAddress()">検索</button>
        </div>
        <div class="btn-row">
            <button class="btn-clear" onclick="popPin()">ピン1つ消す</button>
            <button onclick="northUp()">ノースアップ</button>
            <button onclick="headingUp()">ヘディングアップ</button>
        </div>
        <div class="info-panel">
            <div class="distance-display">
                <div class="distance-item">
                    <span class="dist-label">全行程の合計距離</span>
                    <div class="dist-value total-dist"><span id="totalDistance">0.00</span> km</div>
                </div>
            </div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([34.8833, 135.7000], 15); // 初期表示は京都駅付近
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let polyline = L.polyline([], {color: '#d32f2f', weight: 5, opacity: 0.8}).addTo(map);
        let distances = [];
        let currentLocationMarker = null; // 現在地マーカー

        // 現在地取得と追跡
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const currentLatLng = L.latLng(lat, lng);

                    if (currentLocationMarker) {
                        currentLocationMarker.setLatLng(currentLatLng);
                    } else {
                        currentLocationMarker = L.marker(currentLatLng, {
                            icon: L.divIcon({
                                className: 'current-location-icon',
                                html: '<div style="background-color: #007bff; border-radius: 50%; width: 16px; height: 16px; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>',
                                iconSize: [20, 20],
                                iconAnchor: [10, 10]
                            })
                        }).addTo(map);
                    }
                    // 必要に応じて地図を現在地に移動 (コメントアウト)
                    // map.panTo(currentLatLng);
                },
                (error) => {
                    console.error("現在位置の取得に失敗しました:", error);
                    alert("現在位置の取得に失敗しました。位置情報サービスを有効にしてください。");
                },
                {
                    enableHighAccuracy: true, // 高精度な位置情報を要求
                    maximumAge: 0,            // 位置情報のキャッシュを無効にする
                    timeout: 5000             // 5秒以内に位置情報を取得できない場合はタイムアウト
                }
            );
        } else {
            alert("お使いのブラウザはGeolocationをサポートしていません。");
        }


        async function searchAddress() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;

            // 緯度経度形式のチェック (例: "35.681236, 139.767125" または "35.681236 139.767125")
            const latLngRegex = /^(-?\d+(\.\d+)?),\s*(-?\d+(\.\d+)?)$|^(-?\d+(\.\d+)?)\s+(-?\d+(\.\d+)?)$/;
            const match = address.match(latLngRegex);

            if (match) {
                // 緯度経度として処理
                const lat = parseFloat(match[1] || match[5]);
                const lng = parseFloat(match[3] || match[7]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    const pos = L.latLng(lat, lng);
                    map.setView(pos, 16);
                    addPin(pos);
                    return;
                }
            }

            // 住所検索として処理
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const pos = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView(pos, 16);
                    addPin(pos);
                } else {
                    alert("指定された住所や緯度経度は見つかりませんでした。");
                }
            } catch (e) { 
                alert("検索中にエラーが発生しました。"); 
                console.error(e);
            }
        }

        function addPin(latlng) {
            const marker = L.marker(latlng).addTo(map);
            if (markers.length > 0) {
                const lastPos = markers[markers.length - 1].getLatLng();
                const dist = lastPos.distanceTo(latlng);
                distances.push(dist);
                updateDisplay();
            } else {
                updateDisplay();
            }
            markers.push(marker);
            polyline.addLatLng(latlng);
        }

        function popPin() {
            if (markers.length === 0) return;

            const lastMarker = markers.pop();
            map.removeLayer(lastMarker);

            const latlngs = polyline.getLatLngs();
            if (latlngs.length > 0) {
                latlngs.pop();
                polyline.setLatLngs(latlngs);
            }
            
            if (distances.length > 0) {
                distances.pop();
            }
            
            updateDisplay();
        }

        function updateDisplay() {
            const total = distances.reduce((a, b) => a + b, 0);
            document.getElementById('totalDistance').innerText = (total / 1000).toFixed(2);
        }

        // ノースアップ機能
        function northUp() {
            map.setBearing(0); // 地図の回転を0度にリセット
        }

        // ヘディングアップ機能
        let headingUpEnabled = false;
        function headingUp() {
            headingUpEnabled = !headingUpEnabled; // トグル

            if (headingUpEnabled) {
                alert("ヘディングアップを有効にしました。デバイスを動かして試してください。");
                // デバイスの向きイベントをリッスン
                window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
                // 許可リクエスト（iOS 13+ の場合）
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
                            } else {
                                alert('デバイスの向き情報へのアクセスが拒否されました。設定を確認してください。');
                                headingUpEnabled = false; // 無効化
                            }
                        })
                        .catch(console.error);
                } else {
                    // 古いブラウザやAndroidの場合
                    window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
                }
            } else {
                alert("ヘディングアップを無効にしました。");
                window.removeEventListener('deviceorientationabsolute', handleDeviceOrientation);
                northUp(); // ヘディングアップ解除時にノースアップに戻す
            }
        }

        function handleDeviceOrientation(event) {
            if (event.alpha !== null) {
                let heading = 360 - event.alpha; 

                if (event.webkitCompassHeading !== undefined) {
                    heading = event.webkitCompassHeading; 
                    heading = 360 - heading; 
                }
                
                map.setBearing(heading);
            }
        }

        map.on('click', e => addPin(e.latlng));
    </script>
</body>
</html>
