<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; cursor: crosshair; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .leaflet-container { cursor: crosshair !important; }
        
        .control-panel {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); 
            padding: 5px 8px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column; 
            gap: 5px;
            align-items: stretch; 
            font-size: 12px;
        }

        .input-group { 
            display: flex; 
            gap: 2px;
            width: 100%; 
        }
        input { 
            flex: 1; 
            padding: 5px;
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 12px;
            min-width: 80px;
        }
        button { 
            padding: 5px 8px;
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 12px;
            white-space: nowrap; 
        }
        
        .btn-row { 
            display: flex; 
            gap: 2px;
            flex-wrap: nowrap; 
            width: 100%; 
            justify-content: space-between;
        }
        .btn-clear { background: #6c757d; } 

        .btn-row button {
            flex-grow: 1; 
            flex-basis: 0;
            min-width: 0; 
        }
        
        .info-panel { 
            background: #f0f4f8; 
            padding: 3px 5px;
            border-radius: 6px; 
            border: 1px solid #d1d9e6;
            width: 100%; 
            text-align: center; 
            margin-top: 5px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .distance-display {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dist-label { font-size: 8px; color: #666; display: block; text-align: center; }
        .dist-value { font-size: 13px; font-weight: bold; color: #333; text-align: center; }
        .total-dist { color: #d32f2f; }
        
        .current-location-icon {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (min-width: 769px) {
            .control-panel {
                flex-direction: row; 
                flex-wrap: nowrap; 
                align-items: center;
                justify-content: flex-start; 
                padding: 8px 10px;
                gap: 8px;
            }
            .input-group {
                flex-grow: 1; 
                max-width: none; 
            }
            .btn-row {
                flex-grow: 0; 
                flex-wrap: nowrap; 
                margin-left: auto; 
                width: auto;
                gap: 5px;
            }
            .btn-row button {
                flex-grow: 0; 
                min-width: unset;
                padding: 7px 12px;
            }
            .info-panel {
                width: auto; 
                margin-left: 10px; 
                flex-shrink: 0; 
                margin-top: 0;
                padding: 4px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="住所・施設・座標">
            <button onclick="searchAddress()">検索</button>
        </div>
        <div class="btn-row">
            <button class="btn-clear" onclick="popPin()">↩️1つ消す</button>
            <button onclick="northUp()">▲北上(Nup)</button>
            <button onclick="alert('この機能は現在サポートされていません。')">▼進行(Hup)</button>
        </div>
        <div class="info-panel">
            <div class="distance-display">
                <span class="dist-label">合計距離: </span>
                <span class="dist-value total-dist" id="totalDistance">0.00</span>
                <span class="dist-label"> km</span>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        const map = L.map('map').setView([34.8833, 135.7000], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let polyline = L.polyline([], {color: '#d32f2f', weight: 5, opacity: 0.8}).addTo(map);
        let distances = []; 
        let currentLocationMarker = null; 

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const currentLatLng = L.latLng(lat, lng);

                    if (currentLocationMarker) {
                        currentLocationMarker.setLatLng(currentLatLng);
                    } else {
                        currentLocationMarker = L.marker(currentLatLng, {
                            icon: L.divIcon({
                                className: 'current-location-icon',
                                html: '<div style="background-color: #007bff; border-radius: 50%; width: 16px; height: 16px; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>',
                                iconSize: [20, 20],
                                iconAnchor: [10, 10]
                            })
                        }).addTo(map);
                    }
                },
                (error) => {
                    console.error("現在位置の取得に失敗しました:", error);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                }
            );
        }

        async function searchAddress() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;

            const latLngRegex = /^(-?\d+(\.\d+)?),\s*(-?\d+(\.\d+)?)$|^(-?\d+(\.\d+)?)\s+(-?\d+(\.\d+)?)$/;
            const match = address.match(latLngRegex);

            if (match) {
                const lat = parseFloat(match[1] || match[5]);
                const lng = parseFloat(match[3] || match[7]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    const pos = L.latLng(lat, lng);
                    map.setView(pos, 16);
                    addPin(pos);
                    return;
                }
            }

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const pos = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView(pos, 16);
                    addPin(pos);
                } else {
                    alert("指定された住所や緯度経度は見つかりませんでした。");
                }
            } catch (e) { 
                alert("検索中にエラーが発生しました。"); 
                console.error(e);
            }
        }

        function addPin(latlng) {
            const marker = L.marker(latlng).addTo(map);
            if (markers.length > 0) {
                const lastPos = markers[markers.length - 1].getLatLng();
                const dist = lastPos.distanceTo(latlng); 
                distances.push(dist);
            }
            markers.push(marker);
            polyline.addLatLng(latlng);
            updateDisplay(); 
        }

        function popPin() {
            if (markers.length === 0) return;
            const lastMarker = markers.pop();
            map.removeLayer(lastMarker);
            const latlngs = polyline.getLatLngs();
            if (latlngs.length > 0) {
                latlngs.pop();
                polyline.setLatLngs(latlngs);
            }
            if (distances.length > 0) {
                distances.pop(); 
            }
            updateDisplay(); 
        }

        function updateDisplay() {
            const total = distances.reduce((a, b) => a + b, 0); 
            document.getElementById('totalDistance').innerText = (total / 1000).toFixed(2); 
        }

        function northUp() {
            alert("この機能は現在サポートされていません。（地図の回転には追加のライブラリが必要です）");
        }

        map.on('click', e => addPin(e.latlng));

        // Service Workerの登録（PWA化に必須）
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered', reg))
                .catch(err => console.error('Service Worker registration failed', err));
            });
        }

        updateDisplay();
    </script>
</body>
</html>
