<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; cursor: crosshair; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .leaflet-container { cursor: crosshair !important; }
        
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 90%;
            width: 250px;
        }

        /* スマートフォン向けにレスポンシブな調整 */
        @media (max-width: 600px) {
            .control-panel {
                width: calc(100% - 20px);
                left: 10px;
                right: 10px;
                top: 8px;
                padding: 8px;
            }
            .input-group, .btn-row {
                flex-direction: row;
                margin-bottom: 6px;
            }
            input, button {
                padding: 7px; /* ボタン、入力欄のパディングをさらに小さく */
                font-size: 13px; /* フォントサイズも小さく */
            }
            .info-panel {
                padding: 6px; /* info-panelのパディングをさらに小さく */
            }
            .dist-label {
                font-size: 10px; /* ラベルのフォントサイズを小さく */
                margin-bottom: 2px; /* ラベルと値の間のマージンを詰める */
            }
            .dist-value {
                font-size: 16px; /* 距離の値のフォントサイズを小さく */
            }
            hr {
                margin: 6px 0 !important; /* 区切り線のマージンも詰める */
            }
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-clear { flex: 1; background: #dc3545; }
        .info-panel { background: #f0f4f8; padding: 8px; border-radius: 6px; border: 1px solid #d1d9e6; }
        .dist-label { font-size: 11px; color: #666; display: block; margin-bottom: 3px;} /* 調整 */
        .dist-value { font-size: 18px; font-weight: bold; color: #333; } /* 調整 */
        .total-dist { color: #d32f2f; }
        hr { border: 0; border-top: 1px solid #d1d9e6; margin: 7px 0; } /* 調整 */
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="住所・施設名を入力">
            <button onclick="searchAddress()">検索</button>
        </div>
        <div class="btn-row">
            <button class="btn-clear" onclick="popPin()">1つ消す</button>
        </div>
        <div class="info-panel">
            <span class="dist-label">最新区間の距離</span>
            <div class="dist-value"><span id="segmentDistance">0.00</span> km</div>
            <hr>
            <span class="dist-label">全行程の合計距離</span>
            <div class="dist-value total-dist"><span id="totalDistance">0.00</span> km</div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([34.8833, 135.7000], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let polyline = L.polyline([], {color: '#d32f2f', weight: 5, opacity: 0.8}).addTo(map);
        let distances = [];

        async function searchAddress() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const pos = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView(pos, 16);
                    addPin(pos);
                } else {
                    alert("指定された住所は見つかりませんでした。");
                }
            } catch (e) { 
                alert("検索中にエラーが発生しました。"); 
                console.error(e);
            }
        }

        function addPin(latlng) {
            const marker = L.marker(latlng).addTo(map);
            if (markers.length > 0) {
                const lastPos = markers[markers.length - 1].getLatLng();
                const dist = lastPos.distanceTo(latlng);
                distances.push(dist);
                updateDisplay(dist);
            } else {
                updateDisplay(0);
            }
            markers.push(marker);
            polyline.addLatLng(latlng);
        }

        function popPin() {
            if (markers.length === 0) return;

            const lastMarker = markers.pop();
            map.removeLayer(lastMarker);

            const latlngs = polyline.getLatLngs();
            if (latlngs.length > 0) {
                latlngs.pop();
                polyline.setLatLngs(latlngs);
            }
            
            if (distances.length > 0) {
                distances.pop();
            }
            
            const newTotal = distances.reduce((a, b) => a + b, 0);
            const lastSegment = distances.length > 0 ? distances[distances.length - 1] : 0;
            document.getElementById('segmentDistance').innerText = (lastSegment / 1000).toFixed(2);
            document.getElementById('totalDistance').innerText = (newTotal / 1000).toFixed(2);
        }

        function updateDisplay(currentSegment) {
            const total = distances.reduce((a, b) => a + b, 0);
            document.getElementById('segmentDistance').innerText = (currentSegment / 1000).toFixed(2);
            document.getElementById('totalDistance').innerText = (total / 1000).toFixed(2);
        }

        map.on('click', e => addPin(e.latlng));
    </script>
</body>
</html>
