<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 280px;
        }
        .input-group { display: flex; gap: 5px; margin-bottom: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-gps { flex: 1; background: #28a745; }
        .btn-clear { flex: 1; background: #dc3545; }
        .info-panel { background: #f0f4f8; padding: 10px; border-radius: 6px; border: 1px solid #d1d9e6; }
        .dist-label { font-size: 12px; color: #666; display: block; }
        .dist-value { font-size: 20px; font-weight: bold; color: #333; }
        .total-dist { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="住所・施設名を入力">
            <button onclick="searchAddress()">検索</button>
        </div>
        <div class="btn-row">
            <button class="btn-gps" onclick="getCurrentLocation()">現在地</button>
            <button class="btn-clear" onclick="clearMap()">消去</button>
        </div>
        <div class="info-panel">
            <span class="dist-label">最新区間の距離</span>
            <div class="dist-value"><span id="segmentDistance">0.00</span> km</div>
            <hr style="border: 0; border-top: 1px solid #d1d9e6; margin: 8px 0;">
            <span class="dist-label">全行程の合計距離</span>
            <div class="dist-value total-dist"><span id="totalDistance">0.00</span> km</div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        // 八幡市男山弓岡を初期表示 [cite: 2026-02-23]
        const map = L.map('map').setView([34.8833, 135.7000], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let polyline = L.polyline([], {color: '#d32f2f', weight: 5, opacity: 0.8}).addTo(map);
        let totalDist = 0;

        async function searchAddress() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const pos = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView(pos, 16);
                    addPin(pos);
                } else { alert("見つかりませんでした"); }
            } catch (e) { alert("エラーが発生しました"); }
        }

        function getCurrentLocation() {
            if (!navigator.geolocation) return alert("GPS不可");
            navigator.geolocation.getCurrentPosition(pos => {
                const p = L.latLng(pos.coords.latitude, pos.coords.longitude);
                map.setView(p, 16);
                addPin(p);
            }, () => alert("取得失敗"));
        }

        function addPin(latlng) {
            const marker = L.marker(latlng).addTo(map);
            
            if (markers.length > 0) {
                const lastPos = markers[markers.length - 1].getLatLng();
                const dist = lastPos.distanceTo(latlng);
                totalDist += dist;
                
                // パネルの数値を更新
                document.getElementById('segmentDistance').innerText = (dist / 1000).toFixed(2);
                document.getElementById('totalDistance').innerText = (totalDist / 1000).toFixed(2);
            }
            
            markers.push(marker);
            polyline.addLatLng(latlng);
        }

        map.on('click', e => addPin(e.latlng));

        function clearMap() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            polyline.setLatLngs([]);
            totalDist = 0;
            document.getElementById('segmentDistance').innerText = "0.00";
            document.getElementById('totalDistance').innerText = "0.00";
        }
    </script>
</body>
</html>
