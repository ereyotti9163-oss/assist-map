<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; cursor: crosshair; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .leaflet-container { cursor: crosshair !important; }
        
        /* 既存のコントロールパネル */
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 90%;
            width: 250px;
            font-size: 14px;
        }

        /* 既存のピン消すボタン */
        .btn-pop-pin {
            position: absolute; top: 10px; right: 10px; z-index: 1000; /* 右上に配置 */
            padding: 8px 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            width: 80px; /* 固定幅 */
            text-align: center;
        }

        @media (max-width: 600px) {
            .control-panel {
                width: calc(100% - 20px);
                left: 10px;
                right: 10px;
                top: 8px;
                padding: 6px;
                font-size: 13px;
            }
            .input-group, .btn-row {
                flex-direction: row;
                margin-bottom: 5px;
            }
            input, button {
                padding: 6px;
                font-size: 13px;
            }
            /* .info-panel は新しいスタイルで調整 */
            .distance-display {
                flex-direction: column;
                align-items: flex-start;
                gap: 3px;
            }
            .dist-label {
                font-size: 10px;
                margin-bottom: 0px;
            }
            .dist-value {
                font-size: 14px;
            }
            hr {
                margin: 5px 0 !important;
            }

            /* スマホでのピン消すボタン調整 */
            .btn-pop-pin {
                top: 8px; /* control-panelと合わせる */
                right: 10px;
                width: 65px; /* スマホでさらに小さく */
                padding: 6px 8px;
                font-size: 12px;
            }
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 6px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-row { display: flex; gap: 5px; margin-bottom: 6px; }
        
        /* 修正: info-panelと共有ボタンを横並びにするためのコンテナ */
        .bottom-control-row {
            display: flex;
            gap: 5px; /* アイテム間のスペース */
            margin-top: 6px; /* 上の要素との間隔 */
        }

        /* 修正: info-panelの高さ調整とflexアイテムとしての設定 */
        .info-panel {
            background: #f0f4f8;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid #d1d9e6;
            flex: 1; /* 残りのスペースを埋める */
            display: flex; /* 内部要素を中央寄せするため */
            align-items: center; /* 垂直方向中央寄せ */
            justify-content: center; /* 水平方向中央寄せ */
            height: 40px; /* 高さを半分程度に縮める */
            box-sizing: border-box; /* paddingとborderを高さに含める */
            min-width: 0; /* flexアイテムの幅が内容によって広がりすぎるのを防ぐ */
        }
        
        .distance-display {
            display: flex;
            justify-content: center; /* 中央寄せに変更 */
            align-items: center;
            width: 100%; /* info-panel内で幅をいっぱいに使う */
        }
        .distance-item {
            text-align: center;
        }
        .dist-label { font-size: 11px; color: #666; display: block; margin-bottom: 0; /* 高さを縮めたのでマージンをなくす */ }
        .dist-value { font-size: 16px; font-weight: bold; color: #333; }
        .total-dist { color: #d32f2f; }
        hr { border: 0; border-top: 1px solid #d1d9e6; margin: 6px 0; }

        /* 修正: 共有ボタンのスタイル調整 */
        .btn-share {
            padding: 8px 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            /* width: 80px; */ /* 他のボタンと合わせるために固定幅を削除または調整 */
            text-align: center;
            height: 40px; /* info-panelと高さを合わせる */
            box-sizing: border-box; /* paddingとborderを高さに含める */
            white-space: nowrap; /* テキストが折り返さないように */
            flex-shrink: 0; /* 縮まないように */
        }
        @media (max-width: 600px) {
            .btn-share {
                padding: 6px 8px;
                font-size: 12px;
                height: 36px; /* スマホでの高さ調整 (info-panelに合わせる) */
            }
            .info-panel {
                height: 36px; /* スマホでの高さ調整 */
                padding: 4px;
            }
            .dist-value {
                font-size: 13px; /* スマホで文字がはみ出さないように */
            }
            .dist-label {
                font-size: 9px;
            }
        }


        /* モーダル関連 */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        .close-button {
            color: #aaa;
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-button:hover,
        .close-button:focus {
            color: black;
            text-decoration: none;
        }
        #qrCode {
            width: 150px;
            height: 150px;
            margin: 15px auto;
            display: block;
        }
        #shareLink {
            width: calc(100% - 20px);
            padding: 8px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
        }
        .copy-button {
            background-color: #28a745;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        .copy-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="住所・施設名・緯度経度を入力">
            <button onclick="searchAddress()">検索</button>
        </div>
        <div class="btn-row">
            <button onclick="northUp()">ノースアップ</button>
            <button onclick="headingUp()">ヘディングアップ</button>
        </div>
        <!-- 修正: info-panelと共有ボタンをまとめる新しいコンテナ -->
        <div class="bottom-control-row">
            <div class="info-panel">
                <div class="distance-display">
                    <div class="distance-item">
                        <span class="dist-label">全行程の合計距離</span>
                        <div class="dist-value total-dist"><span id="totalDistance">0.00</span> km</div>
                    </div>
                </div>
            </div>
            <!-- 修正: 共有ボタンをここに移動 -->
            <button class="btn-share" onclick="openShareModal()">共有</button>
        </div>
    </div>

    <!-- 修正: 元々あった右上のボタンコンテナは削除し、ピン消すボタンだけ残す -->
    <button class="btn-pop-pin" onclick="popPin()">ピン消す</button>
    

    <div id="map"></div>

    <!-- 共有モーダル -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeShareModal()">&times;</span>
            <h2>地図を共有</h2>
            <p>現在の地図のリンクとQRコードです。</p>
            <img id="qrCode" src="" alt="QR Code">
            <input type="text" id="shareLink" value="" readonly>
            <button class="copy-button" onclick="copyShareLink()">リンクをコピー</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
        const map = L.map('map').setView([34.8833, 135.7000], 15); // 初期表示は京都駅付近
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let polyline = L.polyline([], {color: '#d32f2f', weight: 5, opacity: 0.8}).addTo(map);
        let distances = [];
        let currentLocationMarker = null; // 現在地マーカー

        // 現在地取得と追跡
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const currentLatLng = L.latLng(lat, lng);

                    if (currentLocationMarker) {
                        currentLocationMarker.setLatLng(currentLatLng);
                    } else {
                        currentLocationMarker = L.marker(currentLatLng, {
                            icon: L.divIcon({
                                className: 'current-location-icon',
                                html: '<div style="background-color: #007bff; border-radius: 50%; width: 16px; height: 16px; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>',
                                iconSize: [20, 20],
                                iconAnchor: [10, 10]
                            })
                        }).addTo(map);
                    }
                    // 必要に応じて地図を現在地に移動
                    // map.panTo(currentLatLng);
                },
                (error) => {
                    console.error("現在位置の取得に失敗しました:", error);
                    // alert("現在位置の取得に失敗しました。位置情報サービスを有効にしてください。"); // モーダルと競合するので一時的にコメントアウト
                },
                {
                    enableHighAccuracy: true, // 高精度な位置情報を要求
                    maximumAge: 0,            // 位置情報のキャッシュを無効にする
                    timeout: 5000             // 5秒以内に位置情報を取得できない場合はタイムアウト
                }
            );
        } else {
            // alert("お使いのブラウザはGeolocationをサポートしていません。"); // モーダルと競合するので一時的にコメントアウト
        }


        async function searchAddress() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;

            // 緯度経度形式のチェック (例: "35.681236, 139.767125" または "35.681236 139.767125")
            const latLngRegex = /^(-?\d+(\.\d+)?),\s*(-?\d+(\.\d+)?)$|^(-?\d+(\.\d+)?)\s+(-?\d+(\.\d+)?)$/;
            const match = address.match(latLngRegex);

            if (match) {
                // 緯度経度として処理
                const lat = parseFloat(match[1] || match[5]);
                const lng = parseFloat(match[3] || match[7]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    const pos = L.latLng(lat, lng);
                    map.setView(pos, 16);
                    addPin(pos);
                    return;
                }
            }

            // 住所検索として処理
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const pos = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView(pos, 16);
                    addPin(pos);
                } else {
                    alert("指定された住所や緯度経度は見つかりませんでした。");
                }
            } catch (e) { 
                alert("検索中にエラーが発生しました。"); 
                console.error(e);
            }
        }

        function addPin(latlng) {
            const marker = L.marker(latlng).addTo(map);
            if (markers.length > 0) {
                const lastPos = markers[markers.length - 1].getLatLng();
                const dist = lastPos.distanceTo(latlng);
                distances.push(dist);
                updateDisplay();
            } else {
                updateDisplay();
            }
            markers.push(marker);
            polyline.addLatLng(latlng);
        }

        function popPin() {
            if (markers.length === 0) return;

            const lastMarker = markers.pop();
            map.removeLayer(lastMarker);

            const latlngs = polyline.getLatLngs();
            if (latlngs.length > 0) {
                latlngs.pop();
                polyline.setLatLngs(latlngs);
            }
            
            if (distances.length > 0) {
                distances.pop();
            }
            
            updateDisplay();
        }

        function updateDisplay() {
            const total = distances.reduce((a, b) => a + b, 0);
            document.getElementById('totalDistance').innerText = (total / 1000).toFixed(2);
        }

        // ノースアップ機能
        function northUp() {
            map.setBearing(0); // 地図の回転を0度にリセット
        }

        // ヘディングアップ機能
        let headingUpEnabled = false;
        function headingUp() {
            headingUpEnabled = !headingUpEnabled; // トグル

            if (headingUpEnabled) {
                alert("ヘディングアップを有効にしました。デバイスを動かして試してください。");
                // デバイスの向きイベントをリッスン
                window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
                // 許可リクエスト（iOS 13+ の場合）
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
                            } else {
                                alert('デバイスの向き情報へのアクセスが拒否されました。設定を確認してください。');
                                headingUpEnabled = false; // 無効化
                            }
                        })
                        .catch(console.error);
                } else {
                    // 古いブラウザやAndroidの場合
                    window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
                }
            } else {
                alert("ヘディングアップを無効にしました。");
                window.removeEventListener('deviceorientationabsolute', handleDeviceOrientation);
                northUp(); // ヘディングアップ解除時にノースアップに戻す
            }
        }

        function handleDeviceOrientation(event) {
            if (event.alpha !== null) {
                // `alpha`は真北からの時計回りの角度
                // LeafletのsetBearingは反時計回りの角度を期待するので、変換が必要
                // ただし、環境によっては `webkitCompassHeading` の方が正確な場合もある
                let heading = 360 - event.alpha; // 真北からの反時計回りの角度

                // より正確なコンパスヘディングがある場合（iOSなど）
                if (event.webkitCompassHeading !== undefined) {
                    heading = event.webkitCompassHeading; // こちらは真北からの時計回り
                    heading = 360 - heading; // Leaflet向けに反時計回りに変換
                }
                
                map.setBearing(heading);
            }
        }

        map.on('click', e => addPin(e.latlng));

        // 共有モーダル関連
        const shareModal = document.getElementById('shareModal');
        const qrCodeElement = document.getElementById('qrCode');
        const shareLinkInput = document.getElementById('shareLink');

        function openShareModal() {
            const currentUrl = window.location.href; // 現在のURLを取得
            shareLinkInput.value = currentUrl;

            // QRコード生成
            new QRious({
                element: qrCodeElement,
                value: currentUrl,
                size: 150
            });

            shareModal.style.display = 'flex'; // flexboxで中央寄せ
        }

        function closeShareModal() {
            shareModal.style.display = 'none';
        }

        function copyShareLink() {
            shareLinkInput.select();
            shareLinkInput.setSelectionRange(0, 99999); // モバイルデバイス用
            document.execCommand('copy');
            alert('リンクをクリップボードにコピーしました！');
        }

        // モーダルの外側をクリックで閉じる
        window.onclick = function(event) {
            if (event.target == shareModal) {
                closeShareModal();
            }
        }
    </script>
</body>
</html>
