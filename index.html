<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ</title>
    
    <!-- Android用: URLバーを非表示にしてアプリ化する設定 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007bff">
    
    <!-- manifest.jsonをファイルを作らずにHTML内に直接埋め込む設定 -->
    <link rel="manifest" href='data:application/json,{"name":"アシストマップ","short_name":"アシスト","start_url":".","display":"standalone","orientation":"portrait","background_color":"#ffffff","theme_color":"#007bff","icons":[{"src":"icon-512.png","sizes":"512x512","type":"image/png"}]}'>

    <!-- アイコンの設定 -->
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; cursor: crosshair; background: #eee; overflow: hidden; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        .control-panel {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.98); 
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column; 
            gap: 8px;
        }

        .input-group { display: flex; gap: 5px; width: 100%; }
        input { 
            flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; 
            font-size: 16px; /* Androidの自動ズーム防止 */
        }
        button { 
            padding: 10px 15px; background: #007bff; color: white; 
            border: none; border-radius: 6px; cursor: pointer; 
            font-weight: bold; font-size: 14px;
        }
        
        .btn-row { display: flex; gap: 5px; width: 100%; }
        .btn-clear { background: #6c757d; } 
        .btn-row button { flex: 1; }
        
        .info-panel { 
            background: #f8f9fa; padding: 8px; border-radius: 6px; 
            border: 1px solid #dee2e6; display: flex; 
            justify-content: center; align-items: center; 
        }
        .dist-label { font-size: 12px; color: #666; margin-right: 5px; }
        .dist-value { font-size: 20px; font-weight: bold; color: #d32f2f; }
        .dist-unit { font-size: 12px; color: #333; margin-left: 3px; }

        .current-location-icon {
            background-color: #007bff; border-radius: 50%;
            width: 14px; height: 14px; border: 2px solid white;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="住所・施設・座標">
            <button onclick="searchAddress()">検索</button>
        </div>
        <div class="btn-row">
            <button class="btn-clear" onclick="popPin()">↩1つ消す</button>
            <button onclick="map.setZoom(map.getZoom()+1)">＋</button>
            <button onclick="map.setZoom(map.getZoom()-1)">ー</button>
        </div>
        <div class="info-panel">
            <span class="dist-label">合計距離:</span>
            <span class="dist-value" id="totalDistance">0.00</span>
            <span class="dist-unit">km</span>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // 地図の初期化
        const map = L.map('map', { zoomControl: false }).setView([34.8833, 135.7000], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let polyline = L.polyline([], {color: '#d32f2f', weight: 5, opacity: 0.8}).addTo(map);
        let distances = []; 
        let currentLocationMarker = null; 

        // 現在地取得
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const latlng = [pos.coords.latitude, pos.coords.longitude];
                if (currentLocationMarker) {
                    currentLocationMarker.setLatLng(latlng);
                } else {
                    currentLocationMarker = L.marker(latlng, {
                        icon: L.divIcon({ className: 'current-location-icon', iconSize: [16, 16] })
                    }).addTo(map);
                }
            }, null, { enableHighAccuracy: true });
        }

        // 住所・座標検索
        async function searchAddress() {
            const query = document.getElementById('addressInput').value;
            if (!query) return;

            // 座標 (緯度,経度) の直接入力判定
            const llMatch = query.match(/^([-+]?\d+\.?\d*)\s*,\s*([-+]?\d+\.?\d*)$/);
            if (llMatch) {
                const pos = L.latLng(parseFloat(llMatch[1]), parseFloat(llMatch[2]));
                map.setView(pos, 16);
                addPin({latlng: pos});
                return;
            }

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if (data.length > 0) {
                    const pos = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView(pos, 16);
                    addPin({latlng: pos});
                } else {
                    alert("見つかりませんでした");
                }
            } catch (e) { alert("通信エラー"); }
        }

        // ピンを追加
        function addPin(e) {
            const latlng = e.latlng;
            const marker = L.marker(latlng).addTo(map);
            if (markers.length > 0) {
                const lastPos = markers[markers.length - 1].getLatLng();
                distances.push(lastPos.distanceTo(latlng));
            }
            markers.push(marker);
            polyline.addLatLng(latlng);
            updateDisplay();
        }

        // ピンを1つ消す
        function popPin() {
            if (markers.length === 0) return;
            map.removeLayer(markers.pop());
            const latlngs = polyline.getLatLngs();
            latlngs.pop();
            polyline.setLatLngs(latlngs);
            distances.pop();
            updateDisplay();
        }

        // 距離表示更新
        function updateDisplay() {
            const total = distances.reduce((a, b) => a + b, 0);
            document.getElementById('totalDistance').innerText = (total / 1000).toFixed(2);
        }

        map.on('click', addPin);
    </script>
</body>
</html>
