<!DOCTYPE html>
<html>
<head>
    <title>アシストマップ</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        #map { height: 100vh; width: 100%; }
        #floating-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 5;
            background-color: #fff;
            padding: 10px;
            border: 1px solid #999;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        input[type="text"] { width: 200px; padding: 5px; }
        input[type="button"] { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="floating-panel">
        <input id="address" type="text" placeholder="住所 または 緯度,経度">
        <input id="submit" type="button" value="検索">
    </div>
    <div id="map"></div>

    <script>
        let map;
        let geocoder;
        let marker;

        function initMap() {
            // 初期表示は八幡市男山弓岡付近
            const myLatLng = { lat: 34.8875, lng: 135.7056 };
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 15,
                center: myLatLng,
                mapTypeControl: true,
            });
            geocoder = new google.maps.Geocoder();
            marker = new google.maps.Marker({
                position: myLatLng,
                map: map,
                title: "現在地付近"
            });

            document.getElementById("submit").addEventListener("click", () => {
                geocodeAddress();
            });
            
            // Enterキーでも検索できるように設定
            document.getElementById("address").addEventListener("keypress", (e) => {
                if (e.key === 'Enter') geocodeAddress();
            });
        }

        function geocodeAddress() {
            const input = document.getElementById("address").value;
            if (!input) return;

            // 緯度経度かどうかの判定
            const regex = /^[-+]?([1-8]?\d(\.\d+)?|90(\.0+)?),\s*[-+]?(180(\.0+)?|((1[0-7]\d)|([1-9]?\d))(\.\d+)?)$/;
            
            if (regex.test(input)) {
                const coords = input.split(",");
                const newPos = { lat: parseFloat(coords[0]), lng: parseFloat(coords[1]) };
                updateMap(newPos);
            } else {
                geocoder.geocode({ address: input }, (results, status) => {
                    if (status === "OK") {
                        updateMap(results[0].geometry.location);
                    } else {
                        alert("検索できませんでした: " + status);
                    }
                });
            }
        }

        function updateMap(location) {
            map.setCenter(location);
            marker.setPosition(location);
            map.setZoom(16);
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initMap" async defer></script>
</body>
</html>
