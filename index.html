<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; cursor: crosshair; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .leaflet-container { cursor: crosshair !important; }
        
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 90%;
            width: 280px; /* 少し幅を広げて調整 */
            font-size: 14px;
            box-sizing: border-box; /* paddingを含めて幅を計算 */
        }

        @media (max-width: 600px) {
            .control-panel {
                width: calc(100% - 20px);
                left: 10px;
                right: 10px;
                top: 8px;
                padding: 6px;
                font-size: 13px;
            }
            .input-group, .btn-row {
                flex-direction: row;
                margin-bottom: 5px;
                gap: 5px; /* ボタン間のギャップを調整 */
            }
            input, button {
                padding: 6px;
                font-size: 13px;
            }
            .info-panel {
                padding: 5px;
            }
            /* QRコードと合計距離の表示をスマホで調整 */
            .bottom-info-row {
                flex-direction: row; /* 横並び */
                justify-content: space-around;
                align-items: center;
                gap: 5px;
            }
            #qrcode-container {
                flex: 1;
                min-width: 80px; /* QRコードエリアの最小幅 */
                padding: 0;
            }
            #qrcode img {
                width: 100% !important; /* 親要素に合わせて調整 */
                height: auto !important;
                max-width: 80px; /* スマホでの最大サイズを制限 */
                max-height: 80px;
            }
            .distance-item {
                flex: 1;
                min-width: 0;
            }
            .dist-label {
                font-size: 10px; /* スマホでより小さく */
                margin-bottom: 1px;
            }
            .dist-value {
                font-size: 16px; /* スマホで認識しやすいサイズを維持 */
            }
            hr {
                margin: 5px 0 !important;
            }
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 6px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-row { display: flex; gap: 5px; margin-bottom: 6px; }
        .btn-row button { flex: 1; } /* ボタンが均等な幅になるように */
        .btn-clear { background: #dc3545; }
        .info-panel { background: #f0f4f8; padding: 6px; border-radius: 6px; border: 1px solid #d1d9e6; }
        
        /* QRコードと合計距離の表示エリア */
        .bottom-info-row {
            display: flex;
            justify-content: space-around; 
            align-items: center;
            flex-wrap: nowrap;
            gap: 10px; 
            margin-top: 5px; /* 上のボタンとの間に少し余白 */
        }
        #qrcode-container {
            flex: 1;
            display: flex; /* QRコード画像を中央に寄せるため */
            justify-content: center;
            align-items: center;
            padding: 5px; /* 枠内の余白 */
            border: 1px solid #d1d9e6;
            border-radius: 6px;
            background: #ffffff;
            min-height: 80px; /* QRコードエリアの最小高さを設定 */
        }
        #qrcode {
            /* QRコードJSによって生成されるキャンバス/画像を格納 */
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #qrcode img {
            max-width: 90px; /* QRコードの最大サイズ */
            height: auto;
            display: block; /* 余分な下余白をなくす */
        }

        .distance-item {
            flex: 1;
            text-align: center;
            flex-shrink: 0; 
            min-width: fit-content; 
            padding: 5px;
            border: 1px solid #d1d9e6;
            border-radius: 6px;
            background: #ffffff;
            min-height: 80px; /* QRコードエリアと高さを合わせる */
            display: flex; /* 中央寄せのため */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .dist-label { font-size: 11px; color: #666; display: block; margin-bottom: 1px;}
        .dist-value { font-size: 20px; font-weight: bold; color: #333; }
        .total-dist { color: #d32f2f; }
        hr { border: 0; border-top: 1px solid #d1d9e6; margin: 6px 0; }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="住所・施設名・緯度経度を入力">
            <button onclick="searchAddress()">検索</button>
        </div>
        <div class="btn-row">
            <button class="btn-clear" onclick="popPin()">ピン1つ消す</button>
            <button onclick="northUp()">ノースアップ</button>
            <button onclick="headingUp()">ヘディングアップ</button>
        </div>
        
        <div class="bottom-info-row">
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>
            <div class="distance-item">
                <span class="dist-label">合計距離</span>
                <div class="dist-value total-dist"><span id="totalDistance">0.00</span> km</div>
            </div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([34.8833, 135.7000], 15); // 初期表示は京都駅付近
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let polyline = L.polyline([], {color: '#d32f2f', weight: 5, opacity: 0.8}).addTo(map);
        let currentLocationMarker = null; // 現在地マーカー
        let totalDistance = 0; // 合計距離を直接保持

        // 現在地取得と追跡
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const currentLatLng = L.latLng(lat, lng);

                    if (currentLocationMarker) {
                        currentLocationMarker.setLatLng(currentLatLng);
                    } else {
                        currentLocationMarker = L.marker(currentLatLng, {
                            icon: L.divIcon({
                                className: 'current-location-icon',
                                html: '<div style="background-color: #007bff; border-radius: 50%; width: 16px; height: 16px; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>',
                                iconSize: [20, 20],
                                iconAnchor: [10, 10]
                            })
                        }).addTo(map);
                    }
                    // 必要に応じて地図を現在地に移動
                    // map.panTo(currentLatLng);
                },
                (error) => {
                    console.error("現在位置の取得に失敗しました:", error);
                    // alert("現在位置の取得に失敗しました。位置情報サービスを有効にしてください。"); // エラー表示は控えめに
                },
                {
                    enableHighAccuracy: true, 
                    maximumAge: 0,            
                    timeout: 5000             
                }
            );
        } else {
            // alert("お使いのブラウザはGeolocationをサポートしていません。"); // エラー表示は控えめに
        }


        async function searchAddress() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;

            const latLngRegex = /^(-?\d+(\.\d+)?),\s*(-?\d+(\.\d+)?)$|^(-?\d+(\.\d+)?)\s+(-?\d+(\.\d+)?)$/;
            const match = address.match(latLngRegex);

            if (match) {
                const lat = parseFloat(match[1] || match[5]);
                const lng = parseFloat(match[3] || match[7]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    const pos = L.latLng(lat, lng);
                    map.setView(pos, 16);
                    addPin(pos);
                    return;
                }
            }

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const pos = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView(pos, 16);
                    addPin(pos);
                } else {
                    alert("指定された住所や緯度経度は見つかりませんでした。");
                }
            } catch (e) { 
                alert("検索中にエラーが発生しました。"); 
                console.error(e);
            }
        }

        function addPin(latlng) {
            const marker = L.marker(latlng).addTo(map);
            if (markers.length > 0) {
                const lastPos = markers[markers.length - 1].getLatLng();
                const dist = lastPos.distanceTo(latlng);
                totalDistance += dist; 
            }
            markers.push(marker);
            polyline.addLatLng(latlng);
            updateDisplay();
            generateQrCode();
        }

        function popPin() {
            if (markers.length === 0) return;

            const removedMarker = markers.pop();
            map.removeLayer(removedMarker);

            // 削除されたピンが起点だった場合の距離の再計算
            if (markers.length > 0) {
                totalDistance = 0; // 一旦リセット
                for (let i = 0; i < markers.length - 1; i++) {
                    totalDistance += markers[i].getLatLng().distanceTo(markers[i+1].getLatLng());
                }
            } else {
                totalDistance = 0;
            }

            const latlngs = polyline.getLatLngs();
            if (latlngs.length > 0) {
                latlngs.pop();
                polyline.setLatLngs(latlngs);
            }
            
            updateDisplay();
            generateQrCode();
        }

        function updateDisplay() {
            document.getElementById('totalDistance').innerText = (totalDistance / 1000).toFixed(2);
        }

        // QRコード生成関数
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width : 80,
            height : 80,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        function generateQrCode() {
            let qrData = "現在のルート情報:\n";
            if (markers.length > 0) {
                markers.forEach((marker, index) => {
                    const latlng = marker.getLatLng();
                    qrData += `地点${index + 1}: Lat ${latlng.lat.toFixed(6)}, Lng ${latlng.lng.toFixed(6)}\n`;
                });
                qrData += `合計距離: ${(totalDistance / 1000).toFixed(2)} km\n`;
            } else {
                qrData = "ピンがありません";
            }
            qrcode.clear(); // 既存のQRコードをクリア
            qrcode.makeCode(qrData); // 新しいデータを設定
        }

        // ノースアップ機能
        function northUp() {
            map.setBearing(0); 
        }

        // ヘディングアップ機能
        let headingUpEnabled = false;
        function headingUp() {
            headingUpEnabled = !headingUpEnabled; 

            if (headingUpEnabled) {
                alert("ヘディングアップを有効にしました。デバイスを動かして試してください。");
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
                            } else {
                                alert('デバイスの向き情報へのアクセスが拒否されました。設定を確認してください。');
                                headingUpEnabled = false; 
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener('deviceorientationabsolute', handleDeviceOrientation);
                }
            } else {
                alert("ヘディングアップを無効にしました。");
                window.removeEventListener('deviceorientationabsolute', handleDeviceOrientation);
                northUp(); 
            }
        }

        function handleDeviceOrientation(event) {
            if (event.alpha !== null) {
                let heading = 360 - event.alpha; 
                if (event.webkitCompassHeading !== undefined) {
                    heading = event.webkitCompassHeading; 
                    heading = 360 - heading; 
                }
                map.setBearing(heading);
            }
        }

        map.on('click', e => addPin(e.latlng));

        // 初期表示を更新
        updateDisplay();
        generateQrCode(); // 初期状態でQRコードを生成
    </script>
</body>
</html>
