<style>
    .compass-button {
        position: absolute;
        bottom: 20px; /* 右下に配置 */
        right: 20px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.95);
        border: none;
        border-radius: 50%; /* 丸いボタン */
        width: 48px;
        height: 48px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        cursor: pointer;
        transition: background 0.3s ease;
    }
    .compass-button img {
        width: 30px;
        height: 30px;
        transition: transform 0.1s ease-out; /* スムーズな回転 */
    }
    .compass-button.active {
        background: #007bff; /* アクティブ時の色 */
    }
    .compass-button.active img {
        filter: invert(1); /* アイコンの色を反転させて白くする */
    }

    @media (max-width: 600px) {
        .compass-button {
            bottom: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
        }
        .compass-button img {
            width: 25px;
            height: 25px;
        }
    }
</style>

<button id="compassButton" class="compass-button" onclick="toggleHeadingUp()">
    <img src="https://cdnjs.cloudflare.com/ajax/libs/open-iconic/1.1.1/png/compass-2x.png" alt="Compass">
</button>

<script>
    let isHeadingUp = false;
    let compassWatcher = null; // deviceorientationイベントリスナーを保持する変数

    // 初期化時に関数を定義
    document.addEventListener('DOMContentLoaded', () => {
        // 画像のプリロード
        const img = new Image();
        img.src = "https://cdnjs.cloudflare.com/ajax/libs/open-iconic/1.1.1/png/compass-2x.png";
    });

    function toggleHeadingUp() {
        const compassButton = document.getElementById('compassButton');

        if (isHeadingUp) {
            // ヘディングアップモードをオフにする
            if (compassWatcher) {
                window.removeEventListener('deviceorientation', compassWatcher);
                compassWatcher = null;
            }
            map.setBearing(0); // 地図を北向きにリセット
            compassButton.classList.remove('active');
            compassButton.querySelector('img').style.transform = 'rotate(0deg)'; // アイコンも北向きにリセット
            isHeadingUp = false;
            console.log("ノースアップモードになりました。");
        } else {
            // ヘディングアップモードをオンにする
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            startCompassWatch();
                        } else {
                            alert('デバイスの向きセンサーへのアクセスが拒否されました。設定を確認してください。');
                        }
                    })
                    .catch(console.error);
            } else {
                // iOS 13未満またはAndroidの場合
                startCompassWatch();
            }
            isHeadingUp = true;
            compassButton.classList.add('active');
            console.log("ヘディングアップモードになりました。");
        }
    }

    function startCompassWatch() {
        // compassWatcherが既に設定されていれば、一度削除
        if (compassWatcher) {
            window.removeEventListener('deviceorientation', compassWatcher);
        }

        compassWatcher = function(event) {
            if (event.absolute && event.alpha !== null) {
                // alpha値は磁北を基準としたデバイスのZ軸周りの回転（0〜360度）
                // LeafletのsetBearingは時計回りの角度を受け取る
                // デバイスの向き（進行方向）を地図の北に合わせるため、
                // alpha値の逆数（360 - alpha）をセットする
                let heading = event.alpha; // 磁北を0度とする
                // Leafletのbearingは反時計回りに正の値なので、360から引く
                let mapBearing = 360 - heading;

                map.setBearing(mapBearing);

                // コンパスアイコンもデバイスの向きに合わせて回転させる
                const compassImg = document.getElementById('compassButton').querySelector('img');
                compassImg.style.transform = `rotate(${heading}deg)`;
            }
        };
        window.addEventListener('deviceorientation', compassWatcher, true);
    }
</script>
