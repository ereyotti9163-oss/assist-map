<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アシストマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; cursor: crosshair; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .leaflet-container { cursor: crosshair !important; }
        
        .control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 90%;
            width: 250px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .control-panel {
                width: calc(100% - 20px);
                left: 10px;
                right: 10px;
                top: 8px;
                padding: 6px;
                font-size: 13px;
            }
            .input-group, .btn-row {
                flex-direction: row;
                margin-bottom: 5px;
            }
            input, button {
                padding: 6px;
                font-size: 13px;
            }
            .info-panel {
                padding: 5px;
            }
            .distance-display {
                flex-direction: column;
                align-items: flex-start;
                gap: 3px;
            }
            .dist-label {
                font-size: 10px;
                margin-bottom: 0px;
            }
            .dist-value {
                font-size: 14px;
            }
            hr {
                margin: 5px 0 !important;
            }
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 6px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-row { display: flex; gap: 5px; margin-bottom: 6px; }
        .btn-clear { flex: 1; background: #dc3545; }
        .info-panel { background: #f0f4f8; padding: 6px; border-radius: 6px; border: 1px solid #d1d9e6; }
        .distance-display {
            display: flex;
            justify-content: center; /* 中央寄せに変更 */
            align-items: center;
        }
        .distance-item {
            text-align: center;
            /* flex: 1; を削除して、要素の幅を内容に合わせる */
        }
        .dist-label { font-size: 11px; color: #666; display: block; margin-bottom: 2px;}
        .dist-value { font-size: 16px; font-weight: bold; color: #333; }
        .total-dist { color: #d32f2f; }
        hr { border: 0; border-top: 1px solid #d1d9e6; margin: 6px 0; }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="addressInput" placeholder="住所・施設名・緯度経度を入力">
            <button onclick="searchAddress()">検索</button>
        </div>
        <div class="btn-row">
            <button class="btn-clear" onclick="popPin()">ピン1つ消す</button>
        </div>
        <div class="info-panel">
            <div class="distance-display">
                <div class="distance-item">
                    <span class="dist-label">全行程の合計距離</span>
                    <div class="dist-value total-dist"><span id="totalDistance">0.00</span> km</div>
                </div>
            </div>
        </div>
    </div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([34.8833, 135.7000], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let polyline = L.polyline([], {color: '#d32f2f', weight: 5, opacity: 0.8}).addTo(map);
        let distances = [];

        async function searchAddress() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;

            // 緯度経度形式のチェック (例: "35.681236, 139.767125" または "35.681236 139.767125")
            const latLngRegex = /^(-?\d+(\.\d+)?),\s*(-?\d+(\.\d+)?)$|^(-?\d+(\.\d+)?)\s+(-?\d+(\.\d+)?)$/;
            const match = address.match(latLngRegex);

            if (match) {
                // 緯度経度として処理
                const lat = parseFloat(match[1] || match[5]);
                const lng = parseFloat(match[3] || match[7]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    const pos = L.latLng(lat, lng);
                    map.setView(pos, 16);
                    addPin(pos);
                    return;
                }
            }

            // 住所検索として処理
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (data.length > 0) {
                    const pos = L.latLng(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    map.setView(pos, 16);
                    addPin(pos);
                } else {
                    alert("指定された住所や緯度経度は見つかりませんでした。");
                }
            } catch (e) { 
                alert("検索中にエラーが発生しました。"); 
                console.error(e);
            }
        }

        function addPin(latlng) {
            const marker = L.marker(latlng).addTo(map);
            if (markers.length > 0) {
                const lastPos = markers[markers.length - 1].getLatLng();
                const dist = lastPos.distanceTo(latlng);
                distances.push(dist);
                updateDisplay();
            } else {
                updateDisplay();
            }
            markers.push(marker);
            polyline.addLatLng(latlng);
        }

        function popPin() {
            if (markers.length === 0) return;

            const lastMarker = markers.pop();
            map.removeLayer(lastMarker);

            const latlngs = polyline.getLatLngs();
            if (latlngs.length > 0) {
                latlngs.pop();
                polyline.setLatLngs(latlngs);
            }
            
            if (distances.length > 0) {
                distances.pop();
            }
            
            updateDisplay();
        }

        function updateDisplay() {
            const total = distances.reduce((a, b) => a + b, 0);
            document.getElementById('totalDistance').innerText = (total / 1000).toFixed(2);
        }

        map.on('click', e => addPin(e.latlng));
    </script>
</body>
</html>
